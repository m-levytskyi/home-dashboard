<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="format-detection" content="telephone=no">
  <title>Home Dashboard</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #f3f0e9;
      color: #191919;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    * { box-sizing: border-box; }

    body {
      padding: 28px;
      overflow-x: hidden;
    }

    #dashboard {
      max-width: 760px;
      margin: 0 auto;
      position: relative;
      -webkit-transition: -webkit-transform 1.2s ease;
      transition: transform 1.2s ease;
    }

    .top {
      border-bottom: 1px solid rgba(0,0,0,.18);
      padding-bottom: 22px;
      margin-bottom: 25px;
    }

    #time {
      font-size: 82px;
      font-weight: 300;
      letter-spacing: -5px;
      line-height: .95;
    }

    #date {
      margin-top: 12px;
      font-size: 22px;
      font-weight: 400;
      color: #5b5b55;
    }

    .section {
      border-bottom: 1px solid rgba(0,0,0,.18);
      padding: 0 0 24px;
      margin: 0 0 24px;
    }

    .section:last-child { border-bottom: 0; }

    .label {
      margin-bottom: 14px;
      color: #686861;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .weather-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .weather-now {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .weather-icon {
      font-size: 38px;
      line-height: 1;
      width: 42px;
      text-align: center;
    }

    .weather-temp {
      font-size: 72px;
      font-weight: 500;
      letter-spacing: -3px;
      line-height: .95;
      color: #000;
      white-space: nowrap;
    }

    .weather-range {
      text-align: right;
      min-width: 92px;
    }

    .range-high,
    .range-low {
      font-size: 24px;
      line-height: 1.1;
      color: #292925;
    }

    .range-low {
      color: #5f5f58;
      margin-top: 6px;
    }

    .muted {
      color: #676760;
      font-size: 16px;
      line-height: 1.45;
    }

    .weather-details {
      display: table;
      width: 100%;
      table-layout: fixed;
      margin-top: 22px;
    }

    .weather-detail {
      display: table-cell;
      width: 33%;
      padding-right: 8px;
    }

    .weather-detail strong {
      display: block;
      font-size: 19px;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .weather-detail span {
      color: #73736c;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .7px;
    }

    .hourly {
      white-space: nowrap;
      overflow: hidden;
      margin-top: 22px;
    }

    .hour {
      display: inline-block;
      width: 72px;
      margin-right: 9px;
      text-align: center;
      vertical-align: top;
    }

    .hour-time {
      color: #707069;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .hour-icon {
      font-size: 20px;
      line-height: 1;
      margin-bottom: 5px;
    }

    .hour-temp {
      font-size: 18px;
      margin-bottom: 0;
    }

    .hour-rain {
      color: #676760;
      font-size: 12px;
    }


    .info-pair {
      display: table;
      width: 100%;
      table-layout: fixed;
    }

    .info-card {
      display: table-cell;
      width: 50%;
      vertical-align: top;
      padding-right: 24px;
    }

    .info-card:last-child { padding-right: 0; }

    .info-title {
      font-size: 20px;
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .info-date {
      color: #62625c;
      font-size: 16px;
      line-height: 1.4;
    }

    .info-note {
      color: #85857d;
      font-size: 12px;
      margin-top: 5px;
    }

    .departures {
      width: 100%;
      border-collapse: collapse;
    }

    .departures td {
      padding: 10px 0;
      border-top: 1px solid rgba(0,0,0,.09);
      vertical-align: middle;
    }

    .departures tr:first-child td { border-top: 0; }

    .line {
      width: 68px;
      font-size: 19px;
      font-weight: 600;
    }

    .destination {
      font-size: 17px;
      padding-right: 8px !important;
    }

    .minutes {
      width: 72px;
      text-align: right;
      font-size: 18px;
      white-space: nowrap;
    }

    .late {
      display: block;
      color: #846135;
      font-size: 11px;
      margin-top: 2px;
    }

    .error, .loading {
      color: #74746c;
      font-size: 15px;
      line-height: 1.5;
      padding: 8px 0;
    }

    #updated {
      text-align: center;
      color: #86867f;
      font-size: 11px;
      padding: 5px 0 12px;
    }

    @media (max-width: 500px) {
      body { padding: 20px; }
      #time { font-size: 68px; }
      .weather-temp { font-size: 58px; }
      .weather-icon { font-size: 32px; width: 36px; }
      .range-high, .range-low { font-size: 20px; }
      .weather-detail strong { font-size: 16px; }
      .info-pair, .info-card { display: block; width: 100%; }
      .info-card { padding: 0 0 20px; }
      .info-card:last-child { padding-bottom: 0; }
    }
  </style>
</head>
<body>
  <main id="dashboard">
    <header class="top">
      <div id="time">--:--</div>
      <div id="date">Wird geladen…</div>
    </header>

    <section class="section">
      <div class="label">Wetter</div>

      <div class="weather-main">
        <div class="weather-now">
          <div class="weather-icon" id="weather-icon">○</div>
          <div class="weather-temp" id="temperature">--°</div>
        </div>
        <div class="weather-range">
          <div class="range-high" id="temp-high">--°</div>
          <div class="range-low" id="temp-low">--°</div>
        </div>
      </div>

      <div class="weather-details">
        <div class="weather-detail">
          <strong id="rain-now">--%</strong>
          <span>Regen heute</span>
        </div>
        <div class="weather-detail">
          <strong id="wind">-- km/h</strong>
          <span>Wind max</span>
        </div>
        <div class="weather-detail">
          <strong id="uv-index">--</strong>
          <span>UV max</span>
        </div>
      </div>

      <div class="hourly" id="hourly-weather"></div>
    </section>

    <section class="section">
      <div class="info-pair">
        <div class="info-card">
          <div class="label">Feiertag</div>
          <div id="public-holiday" class="loading">Feiertage werden geladen…</div>
        </div>
        <div class="info-card">
          <div class="label">Schulferien</div>
          <div id="school-holiday" class="loading">Schulferien werden geladen…</div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="label">U-Bahn</div>
      <div id="departures-u6" class="loading">Abfahrten werden geladen…</div>
    </section>

    <section class="section">
      <div class="label">Tram</div>
      <div id="departures-tram" class="loading">Abfahrten werden geladen…</div>
    </section>

    <div id="updated">Wird gestartet…</div>
  </main>

  <script>
    (function () {
      "use strict";

      var WEATHER_URL =
        "https://api.open-meteo.com/v1/forecast" +
        "?latitude=48.113&longitude=11.481" +
        "&current=temperature_2m,weather_code" +
        "&hourly=temperature_2m,weather_code,uv_index" +
        "&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max,wind_speed_10m_max" +
        "&timezone=Europe%2FBerlin&forecast_days=3";

      var TRANSPORT_BASE = "https://efa.mvv-muenchen.de/ng";
      var HOLIDAY_BASE = "https://openholidaysapi.org";

      var stopConfigs = [
        {
          query: "Münchner Freiheit, München",
          target: "departures-u6",
          mode: "subway",
          line: "U6",
          maximum: 5
        },
        {
          query: "Hauptbahnhof Nord, München",
          target: "departures-tram",
          mode: "tram",
          line: "",
          maximum: 5
        }
      ];

      var resolvedStops = {};

      function requestJSON(url, callback) {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.timeout = 15000;

        xhr.onreadystatechange = function () {
          if (xhr.readyState !== 4) return;

          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              callback(null, JSON.parse(xhr.responseText));
            } catch (error) {
              callback(new Error("Ungültige Antwort"));
            }
          } else {
            callback(new Error("Anfrage fehlgeschlagen: " + xhr.status));
          }
        };

        xhr.onerror = function () {
          callback(new Error("Netzwerkfehler"));
        };

        xhr.ontimeout = function () {
          callback(new Error("Zeitüberschreitung"));
        };

        xhr.send();
      }

      function pad(number) {
        return number < 10 ? "0" + number : String(number);
      }

      function updateClock() {
        var now = new Date();
        var days = [
          "Sonntag", "Montag", "Dienstag", "Mittwoch",
          "Donnerstag", "Freitag", "Samstag"
        ];
        var months = [
          "Januar", "Februar", "März", "April", "Mai", "Juni",
          "Juli", "August", "September", "Oktober", "November", "Dezember"
        ];

        document.getElementById("time").innerHTML =
          pad(now.getHours()) + ":" + pad(now.getMinutes());

        document.getElementById("date").innerHTML =
          days[now.getDay()] + ", " +
          now.getDate() + " " +
          months[now.getMonth()] + " " +
          now.getFullYear();
      }

      function weatherText(code) {
        var labels = {
          0: "Klar",
          1: "Überwiegend klar",
          2: "Teilweise bewölkt",
          3: "Bedeckt",
          45: "Nebel",
          48: "Raureifnebel",
          51: "Leichter Nieselregen",
          53: "Nieselregen",
          55: "Starker Nieselregen",
          56: "Gefrierender Nieselregen",
          57: "Starker gefrierender Nieselregen",
          61: "Leichter Regen",
          63: "Regen",
          65: "Starker Regen",
          66: "Gefrierender Regen",
          67: "Starker gefrierender Regen",
          71: "Leichter Schneefall",
          73: "Schneefall",
          75: "Starker Schneefall",
          77: "Schneegriesel",
          80: "Leichte Regenschauer",
          81: "Regenschauer",
          82: "Starke Regenschauer",
          85: "Schneeschauer",
          86: "Starke Schneeschauer",
          95: "Gewitter",
          96: "Gewitter mit Hagel",
          99: "Starkes Gewitter"
        };
        return labels[code] || "Wetter";
      }

      function weatherIcon(code) {
        var value = Number(code);
        if (value === 0 || value === 1) return "☀";
        if (value === 2) return "⛅";
        if (value === 3) return "☁";
        if (value === 45 || value === 48) return "🌫";
        if ((value >= 51 && value <= 67) || (value >= 80 && value <= 82)) {
          return "☂";
        }
        if (value >= 71 && value <= 77) return "❄";
        if (value === 85 || value === 86) return "❄";
        if (value >= 95) return "⚡";
        return "○";
      }

      function timeFromISO(value) {
        if (!value) return "--:--";
        var match = /T(\d\d:\d\d)/.exec(value);
        return match ? match[1] : "--:--";
      }

      function findCurrentHourIndex(times) {
        var now = new Date();
        var key =
          now.getFullYear() + "-" +
          pad(now.getMonth() + 1) + "-" +
          pad(now.getDate()) + "T" +
          pad(now.getHours()) + ":00";

        var i;
        for (i = 0; i < times.length; i++) {
          if (times[i] === key) return i;
        }
        return 0;
      }

      function loadWeather() {
        requestJSON(WEATHER_URL, function (error, data) {
          if (error || !data || !data.current) {
            document.getElementById("weather-icon").innerHTML = "○";
            document.getElementById("temperature").innerHTML = "--°";
            document.getElementById("temp-high").innerHTML = "--°";
            document.getElementById("temp-low").innerHTML = "--°";
            document.getElementById("rain-now").innerHTML = "--%";
            document.getElementById("wind").innerHTML = "-- km/h";
            document.getElementById("uv-index").innerHTML = "--";
            document.getElementById("hourly-weather").innerHTML =
              '<div class="error">Wetter nicht verfügbar.</div>';
            return;
          }

          var current = data.current;
          var daily = data.daily;
          var hourly = data.hourly;
          var high = Math.round(daily.temperature_2m_max[0]);
          var low = Math.round(daily.temperature_2m_min[0]);
          var uvMax = daily.uv_index_max && daily.uv_index_max.length ?
            daily.uv_index_max[0] : 0;
          var windMax = daily.wind_speed_10m_max && daily.wind_speed_10m_max.length ?
            daily.wind_speed_10m_max[0] : 0;
          var rainToday = daily.precipitation_probability_max &&
            daily.precipitation_probability_max.length ?
            daily.precipitation_probability_max[0] : 0;

          document.getElementById("temperature").innerHTML =
            Math.round(current.temperature_2m) + "°";
          document.getElementById("weather-icon").innerHTML =
            weatherIcon(current.weather_code);
          document.getElementById("weather-icon").title =
            weatherText(current.weather_code);
          document.getElementById("temp-high").innerHTML = high + "°";
          document.getElementById("temp-low").innerHTML = low + "°";

          document.getElementById("rain-now").innerHTML =
            Math.round(rainToday) + "%";

          document.getElementById("wind").innerHTML =
            Math.round(windMax) + " km/h";

          document.getElementById("uv-index").innerHTML =
            (Math.round(uvMax * 10) / 10);

          var start = findCurrentHourIndex(hourly.time);
          var output = "";
          var i;

          for (i = start; i < start + 8 && i < hourly.time.length; i++) {
            output +=
              '<div class="hour">' +
                '<div class="hour-time">' +
                  (i === start ? "Jetzt" : timeFromISO(hourly.time[i])) +
                '</div>' +
                '<div class="hour-icon">' +
                  weatherIcon(hourly.weather_code[i]) +
                '</div>' +
                '<div class="hour-temp">' +
                  Math.round(hourly.temperature_2m[i]) + "°" +
                '</div>' +
              '</div>';
          }

          document.getElementById("hourly-weather").innerHTML = output;
          setUpdated();
        });
      }

      function localDateString(date) {
        return date.getFullYear() + "-" + pad(date.getMonth() + 1) + "-" +
          pad(date.getDate());
      }

      function parseDateOnly(value) {
        var parts = String(value).split("-");
        return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
      }

      function formatDate(value) {
        var date = typeof value === "string" ? parseDateOnly(value) : value;
        return pad(date.getDate()) + "." + pad(date.getMonth() + 1) + "." +
          date.getFullYear();
      }

      function daysBetween(first, second) {
        var a = new Date(first.getFullYear(), first.getMonth(), first.getDate());
        var b = new Date(second.getFullYear(), second.getMonth(), second.getDate());
        return Math.round((b.getTime() - a.getTime()) / 86400000);
      }

      function localizedHolidayName(item) {
        var names = item.name || [];
        var i;
        for (i = 0; i < names.length; i++) {
          if (String(names[i].language).toLowerCase() === "de") {
            return names[i].text;
          }
        }
        return names.length ? names[0].text : "Unbenannt";
      }

      function holidayHasName(item, searchText) {
        var names = item && item.name ? item.name : [];
        var needle = String(searchText || "").toLowerCase();
        var i;

        for (i = 0; i < names.length; i++) {
          if (String(names[i].text || "").toLowerCase().indexOf(needle) !== -1) {
            return true;
          }
        }

        return false;
      }

      function isMunichPublicHoliday(item) {
        return !holidayHasName(item, "friedensfest");
      }

      function filterMunichPublicHolidays(items) {
        var result = [];
        var i;

        if (!Array.isArray(items)) return result;

        for (i = 0; i < items.length; i++) {
          if (isMunichPublicHoliday(items[i])) {
            result.push(items[i]);
          }
        }

        return result;
      }

      function renderHoliday(targetId, items, school) {
        var today = new Date();
        today = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        var active = null;
        var next = null;
        var i;

        for (i = 0; i < items.length; i++) {
          var start = parseDateOnly(items[i].startDate);
          var end = parseDateOnly(items[i].endDate);
          if (start <= today && end >= today) {
            active = items[i];
            break;
          }
          if (start > today && (!next || start < parseDateOnly(next.startDate))) {
            next = items[i];
          }
        }

        var item = active || next;
        if (!item) {
          document.getElementById(targetId).innerHTML =
            '<div class="error">Keine Termine verfügbar.</div>';
          return;
        }

        var startDate = parseDateOnly(item.startDate);
        var endDate = parseDateOnly(item.endDate);
        var name = localizedHolidayName(item);
        var dateText = formatDate(startDate);
        if (school || item.startDate !== item.endDate) {
          dateText = formatDate(startDate) + "–" + formatDate(endDate);
        }

        var note;
        if (active) {
          note = school ? "Ferien laufen derzeit" : "Heute";
        } else {
          var days = daysBetween(today, startDate);
          note = "In " + days + (days === 1 ? " Tag" : " Tagen");
        }

        document.getElementById(targetId).innerHTML =
          '<div class="info-title">' + escapeHTML(name) + '</div>' +
          '<div class="info-date">' + dateText + '</div>' +
          '<div class="info-note">' + note + '</div>';
      }

      function loadHolidays() {
        var today = new Date();
        var until = new Date(today.getFullYear() + 1, today.getMonth() + 2, today.getDate());
        var common =
          "?countryIsoCode=DE" +
          "&subdivisionCode=DE-BY" +
          "&languageIsoCode=DE" +
          "&validFrom=" + localDateString(today) +
          "&validTo=" + localDateString(until);

        requestJSON(HOLIDAY_BASE + "/PublicHolidays" + common, function (error, data) {
          if (error || !data) {
            document.getElementById("public-holiday").innerHTML =
              '<div class="error">Feiertage nicht verfügbar.</div>';
            return;
          }
          renderHoliday("public-holiday", filterMunichPublicHolidays(data), false);
          setUpdated();
        });

        requestJSON(HOLIDAY_BASE + "/SchoolHolidays" + common, function (error, data) {
          if (error || !data) {
            document.getElementById("school-holiday").innerHTML =
              '<div class="error">Schulferien nicht verfügbar.</div>';
            return;
          }
          renderHoliday("school-holiday", data, true);
          setUpdated();
        });
      }

      function productMode(departure) {
        function normalizedMode(value) {
          var key = String(value || "")
            .toLowerCase()
            .replace(/[\s_-]/g, "");
          if (!key) return "";
          if (key === "ubahn" || key === "subway" || key === "metro") {
            return "subway";
          }
          if (key === "tram" || key === "streetcar" || key === "str") {
            return "tram";
          }
          if (key === "bus" || key === "nightbus" || key === "nachtbus") {
            return "bus";
          }
          return key;
        }

        var product = departure.line && departure.line.product ?
          normalizedMode(departure.line.product) : "";

        var mode = departure.line && departure.line.mode ?
          normalizedMode(departure.line.mode) : "";

        var name = departure.line && departure.line.name ?
          String(departure.line.name).toUpperCase() : "";

        if (product === "subway" || mode === "subway" || /^U\d+/.test(name)) {
          return "subway";
        }
        if (product === "tram" || mode === "tram") {
          return "tram";
        }
        if (product === "bus" || mode === "bus") {
          return "bus";
        }
        return product || mode;
      }

      function matchesConfig(departure, config) {
        var name = departure.line && departure.line.name ?
          String(departure.line.name).toUpperCase().replace(/\s/g, "") : "";
        var mode = productMode(departure);

        if (config.line &&
            name !== config.line.toUpperCase().replace(/\s/g, "")) {
          return false;
        }

        if (mode === config.mode) return true;
        if (!mode && !config.line) return true;
        return false;
      }

      function departureDate(departure) {
        var value =
          departure.when ||
          departure.plannedWhen ||
          departure.departure ||
          departure.plannedDeparture;

        return value ? new Date(value) : null;
      }

      function minutesUntil(date) {
        if (!date || isNaN(date.getTime())) return null;
        return Math.max(0, Math.round((date.getTime() - new Date().getTime()) / 60000));
      }

      function delayMinutes(departure) {
        if (typeof departure.delayMinutes === "number") {
          return departure.delayMinutes;
        }

        if (typeof departure.delay === "number") {
          return Math.round(departure.delay / 60);
        }

        var actual = departure.when || departure.departure;
        var planned = departure.plannedWhen || departure.plannedDeparture;

        if (actual && planned) {
          return Math.max(
            0,
            Math.round((new Date(actual).getTime() -
              new Date(planned).getTime()) / 60000)
          );
        }

        return 0;
      }

      function lineName(departure) {
        if (departure.line) {
          return departure.line.name ||
            departure.line.fahrtNr ||
            departure.line.id ||
            "—";
        }
        return "—";
      }

      function destinationName(departure) {
        if (departure.direction) return departure.direction;
        if (departure.destination) {
          return departure.destination.name || departure.destination;
        }
        return "Unbekanntes Ziel";
      }

      function renderDepartures(targetId, departures, config) {
        var filtered = [];
        var i;

        for (i = 0; i < departures.length; i++) {
          if (matchesConfig(departures[i], config)) {
            filtered.push(departures[i]);
          }
          if (filtered.length >= config.maximum) break;
        }

        if (!filtered.length) {
          document.getElementById(targetId).innerHTML =
            '<div class="error">No matching departures found.</div>';
          return;
        }

        var html = '<table class="departures">';
        for (i = 0; i < filtered.length; i++) {
          var departure = filtered[i];
          var minutes = minutesUntil(departureDate(departure));
          var delay = delayMinutes(departure);

          html +=
            "<tr>" +
              '<td class="line">' + escapeHTML(lineName(departure)) + "</td>" +
              '<td class="destination">' +
                escapeHTML(destinationName(departure)) +
              "</td>" +
              '<td class="minutes">' +
                (minutes === 0 ? "jetzt" : minutes + " Min.") +
                (delay > 0 ?
                  '<span class="late">+' + delay + " min</span>" : "") +
              "</td>" +
            "</tr>";
        }
        html += "</table>";

        document.getElementById(targetId).innerHTML = html;
      }

      function escapeHTML(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function efaDateTime(value) {
        if (!value) return null;
        if (typeof value === "string") return value;

        if (value.date && value.time) {
          return value.date + "T" + value.time;
        }

        if (typeof value === "object" &&
            value.year && value.month && value.day &&
            (value.hour || value.hour === 0) &&
            (value.minute || value.minute === 0)) {
          return (
            value.year + "-" +
            pad(Number(value.month)) + "-" +
            pad(Number(value.day)) + "T" +
            pad(Number(value.hour)) + ":" +
            pad(Number(value.minute)) + ":00"
          );
        }

        return null;
      }

      function efaModeFromClass(rawClass) {
        var value = Number(rawClass);
        if (!isNaN(value)) {
          if (value === 2 || value === 3) return "subway";
          if (value === 4) return "tram";
          if ((value >= 5 && value <= 8) || value === 11) return "bus";
          if (value === 0 || value === 1 || value === 13 || value === 15 || value === 16) {
            return "train";
          }
        }
        return "";
      }

      function normalizeEFADeparture(rawDeparture) {
        var line = rawDeparture.servingLine ||
          rawDeparture.line ||
          rawDeparture.transportation ||
          {};

        var mode = "";
        if (line.product) {
          mode = String(line.product).toLowerCase();
        } else if (line.mode) {
          mode = String(line.mode).toLowerCase();
        } else if (line.trainType) {
          mode = String(line.trainType).toLowerCase();
        } else if (line.type) {
          mode = String(line.type).toLowerCase();
        } else if (line.motType) {
          mode = String(line.motType).toLowerCase();
        } else if (line.class || line.classId) {
          mode = efaModeFromClass(line.class || line.classId);
        }

        var plannedWhen = efaDateTime(
          rawDeparture.plannedWhen ||
          rawDeparture.plannedDeparture ||
          rawDeparture.dateTime ||
          rawDeparture.dateTimePlanned ||
          rawDeparture.stopDateTime &&
            (rawDeparture.stopDateTime.planned || rawDeparture.stopDateTime.scheduled)
        );

        var when = efaDateTime(
          rawDeparture.when ||
          rawDeparture.departure ||
          rawDeparture.realDateTime ||
          rawDeparture.dateTimeEstimated ||
          rawDeparture.stopDateTime && rawDeparture.stopDateTime.estimated
        ) || plannedWhen;

        var delay = 0;
        if (typeof rawDeparture.delay === "number") {
          delay = rawDeparture.delay;
        } else if (typeof rawDeparture.delayMinutes === "number") {
          delay = rawDeparture.delayMinutes;
        } else if (when && plannedWhen) {
          delay = Math.max(
            0,
            Math.round(
              (new Date(when).getTime() - new Date(plannedWhen).getTime()) / 60000
            )
          );
        }

        return {
          line: {
            name: line.name || line.number || line.symbol || line.id || "—",
            product: mode,
            mode: mode
          },
          direction:
            rawDeparture.direction ||
            rawDeparture.destination &&
              (rawDeparture.destination.name || rawDeparture.destination) ||
            line.direction ||
            "Unbekanntes Ziel",
          when: when,
          plannedWhen: plannedWhen,
          delayMinutes: delay
        };
      }

      function extractLocations(response) {
        if (!response) return [];

        if (Array.isArray(response)) return response;
        if (Array.isArray(response.locations)) return response.locations;
        if (response.locations && Array.isArray(response.locations.points)) {
          return response.locations.points;
        }

        if (response.locations && Array.isArray(response.locations.location)) {
          return response.locations.location;
        }

        if (response.stopFinder && Array.isArray(response.stopFinder.points)) {
          return response.stopFinder.points;
        }

        if (response.stopFinder && response.stopFinder.points &&
            Array.isArray(response.stopFinder.points.point)) {
          return response.stopFinder.points.point;
        }

        return [];
      }

      function locationId(location) {
        return (
          location.id ||
          location.stopId ||
          location.extId ||
          location.locationId ||
          location.stateless ||
          location.ref && (location.ref.id || location.ref.stateless)
        );
      }

      function locationType(location) {
        var type = location.type || location.anyType || location.matchQuality;
        return type ? String(type).toLowerCase() : "";
      }

      function extractDepartures(response) {
        if (!response) return [];

        if (Array.isArray(response.departureList)) {
          return response.departureList;
        }
        if (response.departureList &&
            Array.isArray(response.departureList.departure)) {
          return response.departureList.departure;
        }
        if (Array.isArray(response.departures)) {
          return response.departures;
        }
        if (Array.isArray(response.stopEvents)) {
          return response.stopEvents;
        }
        if (response.dm && Array.isArray(response.dm.points)) {
          return response.dm.points;
        }
        if (Array.isArray(response)) {
          return response;
        }

        return [];
      }

      function resolveStop(config, callback) {
        if (resolvedStops[config.query]) {
          callback(null, resolvedStops[config.query]);
          return;
        }

        var url =
          TRANSPORT_BASE + "/XML_STOPFINDER_REQUEST" +
          "?outputFormat=RapidJSON" +
          "&locationServerActive=1" +
          "&type_sf=stop" +
          "&name_sf=" + encodeURIComponent(config.query);

        requestJSON(url, function (error, response) {
          var locations = extractLocations(response);
          if (error || !locations.length) {
            callback(error || new Error("Haltestelle nicht gefunden"));
            return;
          }

          var selected = null;
          var i;

          for (i = 0; i < locations.length; i++) {
            var currentType = locationType(locations[i]);
            if (!currentType ||
                currentType === "stop" ||
                currentType === "station" ||
                currentType === "platform") {
              selected = locations[i];
              break;
            }
          }

          if (!selected && locations.length) {
            selected = locations[0];
          }

          var selectedId = selected && locationId(selected);
          if (!selectedId) {
            callback(new Error("Haltestelle nicht gefunden"));
            return;
          }

          resolvedStops[config.query] = selectedId;
          callback(null, selectedId);
        });
      }

      function loadStop(config) {
        resolveStop(config, function (error, stopId) {
          if (error) {
            document.getElementById(config.target).innerHTML =
              '<div class="error">Stop could not be found.</div>';
            return;
          }

          var url =
            TRANSPORT_BASE + "/XML_DM_REQUEST" +
            "?outputFormat=RapidJSON" +
            "&stateless=1" +
            "&type_dm=any" +
            "&name_dm=" + encodeURIComponent(stopId) +
            "&mode=direct" +
            "&useRealtime=1" +
            "&limit=30";

          requestJSON(url, function (departureError, response) {
            if (departureError || !response) {
              document.getElementById(config.target).innerHTML =
                '<div class="error">Departures unavailable.</div>';
              return;
            }

            var departures = [];
            var rawDepartures = extractDepartures(response);
            var i;
            for (i = 0; i < rawDepartures.length; i++) {
              departures.push(normalizeEFADeparture(rawDepartures[i]));
            }

            renderDepartures(config.target, departures, config);
            setUpdated();
          });
        });
      }

      function loadTransport() {
        var i;
        for (i = 0; i < stopConfigs.length; i++) {
          loadStop(stopConfigs[i]);
        }
      }

      function setUpdated() {
        var now = new Date();
        document.getElementById("updated").innerHTML =
          "Aktualisiert " + pad(now.getHours()) + ":" + pad(now.getMinutes());
      }

      function driftForScreenProtection() {
        var dashboard = document.getElementById("dashboard");
        var positions = [
          "translate(0px, 0px)",
          "translate(2px, 1px)",
          "translate(-1px, 2px)",
          "translate(1px, -1px)",
          "translate(-2px, 0px)"
        ];

        var index = Math.floor(new Date().getTime() / 300000) % positions.length;
        dashboard.style.webkitTransform = positions[index];
        dashboard.style.transform = positions[index];
      }

      if (typeof window !== "undefined") {
        window.__dashboardTestHooks = {
          extractLocations: extractLocations,
          locationId: locationId,
          locationType: locationType,
          extractDepartures: extractDepartures,
          normalizeEFADeparture: normalizeEFADeparture,
          productMode: productMode,
          matchesConfig: matchesConfig,
          lineName: lineName,
          departureDate: departureDate,
          weatherIcon: weatherIcon,
          filterMunichPublicHolidays: filterMunichPublicHolidays,
          isMunichPublicHoliday: isMunichPublicHoliday
        };
      }

      if (!(typeof window !== "undefined" && window.__HOME_DASHBOARD_TEST__)) {
        updateClock();
        loadWeather();
        loadTransport();
        loadHolidays();
        driftForScreenProtection();

        setInterval(updateClock, 1000);
        setInterval(loadTransport, 60000);
        setInterval(loadWeather, 900000);
        setInterval(loadHolidays, 21600000);
        setInterval(driftForScreenProtection, 300000);
      }
    }());
  </script>
</body>
</html>
